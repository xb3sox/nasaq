name: Clinic AI OS CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "lib/**"
      - "components/**"
      - "tests/**"
      - "public/**"
      - "supabase/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "middleware.ts"
      - "auth.ts"
      - "auth.config.ts"
      - "eslint.config.mjs"
      - "postcss.config.mjs"
      - ".github/workflows/*.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "lib/**"
      - "components/**"
      - "tests/**"
      - "public/**"
      - "supabase/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "middleware.ts"
      - "auth.ts"
      - "auth.config.ts"
      - "eslint.config.mjs"
      - "postcss.config.mjs"
      - ".github/workflows/*.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          MOCK_MODE: "true"
