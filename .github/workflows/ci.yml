name: Clinic AI OS CI

on:
  push:
    branches: [main]
    paths:
      - "clinic-ai-os/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "clinic-ai-os/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: clinic-ai-os

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: clinic-ai-os/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          MOCK_MODE: "true"
