name: Clinic AI OS — Jules Polish Pass

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      prompt:
        description: "What should Jules do?"
        required: true
        default: "Polish pass on the Clinic AI OS MVP"

jobs:
  jules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: google-labs/jules-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number || '' }}