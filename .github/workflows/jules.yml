name: Nasaq Jules Polish Pass

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      prompt:
        description: "What should Jules do?"
        required: true
        default: "Polish pass on the Nasaq MVP"
  pull_request:
    branches: [main]
    paths:
      - "clinic-ai-os/**"
      - ".github/workflows/jules.yml"

permissions:
  contents: write
  pull-requests: write
  issues: read
  id-token: write

jobs:
  jules:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Run Jules
        uses: google-labs/jules-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.issue.number || '' }}
          prompt: ${{ github.event.inputs.prompt || github.event.issue.title || 'Review and polish the Nasaq MVP in clinic-ai-os.' }}
          max-steps: 10
