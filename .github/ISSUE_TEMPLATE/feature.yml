name: Feature request
description: Plan a revenue-relevant product slice
title: "feat: "
labels: ["feature", "needs-scope"]
body:
  - type: textarea
    id: outcome
    attributes:
      label: Business outcome
      description: What paid-user behavior, retention, revenue, or operational efficiency does this improve?
      placeholder: "Clinics can... so that..."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should change? Mention routes, files, or modules if known.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checks that prove this is done.
      value: |
        - [ ] Arabic-first UI copy
        - [ ] RTL layout remains correct
        - [ ] Tests added/updated
        - [ ] `npm test && npm run lint && npm run build` passes
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks / constraints
      description: Auth, WhatsApp, Supabase, medical-compliance, migration, or deployment risks.
